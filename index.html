<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>数学电路助手 · Android 下载</title>
  <style>
    :root {
      --ink: #17211c;
      --muted: #61726a;
      --paper: #f4f0e6;
      --panel: rgba(255, 252, 244, 0.82);
      --line: rgba(28, 55, 45, 0.16);
      --green: #0f7b58;
      --green-dark: #07533b;
      --lime: #c9ff5d;
      --amber: #f0b54b;
      --blueprint: #173f3a;
      --shadow: 0 28px 80px rgba(14, 36, 29, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background:
        radial-gradient(circle at 16% 18%, rgba(201, 255, 93, 0.32), transparent 28rem),
        radial-gradient(circle at 88% 12%, rgba(240, 181, 75, 0.24), transparent 24rem),
        linear-gradient(135deg, #fbf7ec 0%, var(--paper) 44%, #e9f1df 100%);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", "Noto Serif SC", serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(23, 63, 58, 0.065) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 63, 58, 0.065) 1px, transparent 1px),
        radial-gradient(circle, rgba(23, 63, 58, 0.08) 1px, transparent 1.5px);
      background-size: 44px 44px, 44px 44px, 18px 18px;
      mask-image: linear-gradient(to bottom, black, rgba(0, 0, 0, 0.76), transparent 92%);
    }

    .page {
      position: relative;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 34px;
    }

    .masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 54px;
      font-family: "Trebuchet MS", "Noto Sans SC", sans-serif;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--blueprint);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .mark {
      position: relative;
      width: 36px;
      height: 36px;
      border: 2px solid var(--blueprint);
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 8px 8px 0 rgba(15, 123, 88, 0.16);
    }

    .mark::before,
    .mark::after {
      content: "";
      position: absolute;
      background: var(--blueprint);
    }

    .mark::before {
      width: 18px;
      height: 2px;
      left: 7px;
      top: 16px;
      transform: rotate(-28deg);
    }

    .mark::after {
      width: 2px;
      height: 18px;
      left: 17px;
      top: 7px;
      transform: rotate(-28deg);
    }

    .version-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.5);
      color: var(--muted);
      font-family: "Trebuchet MS", "Noto Sans SC", sans-serif;
      font-size: 13px;
      letter-spacing: 0.04em;
      backdrop-filter: blur(14px);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.72fr);
      gap: 48px;
      align-items: center;
    }

    .copy {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      color: var(--green-dark);
      font-family: "Trebuchet MS", "Noto Sans SC", sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 38px;
      height: 2px;
      background: var(--green);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(52px, 8vw, 104px);
      line-height: 0.9;
      letter-spacing: -0.075em;
      font-weight: 900;
    }

    .accent {
      display: inline-block;
      position: relative;
      color: var(--green-dark);
    }

    .accent::after {
      content: "";
      position: absolute;
      left: -0.04em;
      right: -0.04em;
      bottom: 0.08em;
      height: 0.18em;
      background: var(--lime);
      z-index: -1;
      transform: rotate(-1.8deg);
    }

    .lead {
      width: min(660px, 100%);
      margin: 26px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 2.3vw, 23px);
      line-height: 1.68;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      margin-top: 34px;
    }

    .download {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 0 28px;
      border: 2px solid var(--green-dark);
      border-radius: 18px;
      background: var(--green);
      color: white;
      box-shadow: 8px 8px 0 var(--green-dark);
      font-family: "Trebuchet MS", "Noto Sans SC", sans-serif;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .download:hover {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0 var(--green-dark);
      background: #118966;
    }

    .download:active {
      transform: translate(8px, 8px);
      box-shadow: 0 0 0 var(--green-dark);
    }

    .secondary {
      color: var(--muted);
      font-family: "Trebuchet MS", "Noto Sans SC", sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }

    .phone-card {
      position: relative;
      min-height: 560px;
    }

    .orbit {
      position: absolute;
      inset: 22px -10px auto auto;
      width: 360px;
      height: 360px;
      border: 1px dashed rgba(15, 123, 88, 0.32);
      border-radius: 50%;
      animation: spin 24s linear infinite;
    }

    .orbit::before,
    .orbit::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 0 8px rgba(240, 181, 75, 0.14);
    }

    .orbit::before {
      left: 42px;
      top: 48px;
    }

    .orbit::after {
      right: 22px;
      bottom: 92px;
      background: var(--lime);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .device {
      position: relative;
      width: min(350px, 92vw);
      margin: 0 auto;
      border: 10px solid #18372d;
      border-radius: 38px;
      background: #fdfaf2;
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255, 255, 255, 0.58);
      overflow: hidden;
      transform: rotate(2deg);
    }

    .device::before {
      content: "";
      display: block;
      width: 96px;
      height: 8px;
      margin: 14px auto 6px;
      border-radius: 999px;
      background: #18372d;
      opacity: 0.9;
    }

    .screen {
      padding: 18px 18px 24px;
    }

    .mini-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-family: "Trebuchet MS", "Noto Sans SC", sans-serif;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .bubble {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 12px;
      background: rgba(244, 240, 230, 0.72);
    }

    .bubble.primary {
      background: var(--green);
      color: white;
      border-color: transparent;
      margin-left: 38px;
    }

    .formula {
      font-size: 18px;
      color: var(--green-dark);
      letter-spacing: 0.03em;
    }

    .bubble.primary .formula {
      color: white;
    }

    .circuit {
      position: relative;
      height: 138px;
      margin-top: 18px;
      border-radius: 22px;
      background:
        linear-gradient(90deg, transparent 48%, rgba(15, 123, 88, 0.14) 48% 52%, transparent 52%),
        linear-gradient(rgba(15, 123, 88, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 123, 88, 0.12) 1px, transparent 1px),
        #f5f2e8;
      background-size: 100% 100%, 22px 22px, 22px 22px, auto;
      border: 1px solid var(--line);
    }

    .node {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 3px solid var(--green-dark);
      border-radius: 50%;
      background: var(--lime);
    }

    .n1 { left: 44px; top: 60px; }
    .n2 { right: 44px; top: 60px; }
    .n3 { left: 50%; bottom: 24px; transform: translateX(-50%); }

    .resistor {
      position: absolute;
      left: 84px;
      right: 84px;
      top: 64px;
      height: 3px;
      background: var(--green-dark);
    }

    .resistor::before {
      content: "R";
      position: absolute;
      left: 50%;
      top: -26px;
      transform: translateX(-50%);
      color: var(--green-dark);
      font-family: "Trebuchet MS", sans-serif;
      font-weight: 900;
    }

    footer {
      margin-top: 42px;
      color: rgba(97, 114, 106, 0.78);
      font-family: "Trebuchet MS", "Noto Sans SC", sans-serif;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 880px) {
      .page { padding-top: 28px; }
      .masthead { margin-bottom: 34px; }
      .hero { grid-template-columns: 1fr; }
      .phone-card { min-height: auto; padding: 12px 0 2px; }
      .orbit { right: 50%; transform: translateX(50%); }
    }

    @media (max-width: 520px) {
      .masthead { align-items: flex-start; flex-direction: column; }
      h1 { font-size: clamp(46px, 16vw, 68px); }
      .actions { align-items: stretch; flex-direction: column; }
      .download { width: 100%; }
    }
  </style>
</head>

</body>
</html>
